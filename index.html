<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <title>Eksperiment – Bralno razumevanje</title>

  <script src="https://unpkg.com/jspsych@7.3.3"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
  <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.0"></script>
  <link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text-col: #1a1a2e;
      --bg-col: #fff;
      --accent: #1782d3;
      --muted: #7f8c8d;
      --border: #ddd6cb;
    }

    body {
      background-color: var(--bg-col);
      font-family: 'Source Sans 3', sans-serif;
      color: var(--text-col);
    }

    .jspsych-display-element { background: var(--bg-col) !important; }

    .jspsych-content-wrapper {
      width: 100% !important;
      max-width: 100% !important;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .jspsych-content {
      max-width: 100% !important;
      width: 100% !important;
    }

    /* ── Splošni zasloni ── */
    .zaslon-uvod {
      max-width: 680px;
      margin: 0 auto;
      padding: 60px 32px;
      text-align: center;
    }
    .zaslon-uvod h1 {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 24px;
      line-height: 1.3;
    }
    .zaslon-uvod p {
      font-size: 1.05rem;
      line-height: 1.8;
      color: #444;
      margin-bottom: 16px;
    }

    /* ── Demografski obrazec ── */
    .demo-form {
      max-width: 480px;
      margin: 0 auto;
      padding: 48px 32px;
      text-align: left;
    }
    .demo-form h2 {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      margin-bottom: 28px;
      text-align: center;
    }
    .demo-form label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 20px;
    }
    .demo-form input[type="number"],
    .demo-form select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1rem;
      color: var(--text-col);
      appearance: none;
    }
    .demo-form input:focus,
    .demo-form select:focus { outline: none; border-color: var(--accent); }

    /* ── Branje besedila ── */
    .branje-wrapper {
      display: grid;
      width: 100vw;
      min-height: 100vh;
      align-items: center;
      justify-items: center;
    }
    .branje-wrapper.brez-reklam {
      grid-template-columns: 1fr;
      justify-items: center;
    }
    .branje-wrapper.z-reklamami {
      grid-template-columns: 1fr 2fr 1fr;
    }
    .branje-besedilo {
      padding: 40px 48px;
      max-width: 760px;
      width: 100%;
    }
    .branje-besedilo .naslov-besedila {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }
    .branje-besedilo .odstavek-tekst {
      text-align: center;
      font-family: 'Lora', serif;
      font-size: 1.15rem;
      line-height: 1.9;
      color: #2c2c2c;
    }
    .branje-besedilo .stevec-odstavkov {
      font-size: 0.8rem;
      color: var(--muted);
      text-align: right;
      margin-top: 20px;
      font-style: italic;
    }
    .navodilo-nadaljevanja {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.82rem;
      color: var(--muted);
      background: rgba(255,255,255,0.95);
      padding: 8px 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      backdrop-filter: blur(4px);
      white-space: nowrap;
    }

    /* ── Reklame ── */
    .reklama-stran {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 16px;
      min-height: 100vh;
    }
    .reklama-stran video {
      width: 100%;
      max-width: 220px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: #000;
    }

    /* ── Vprašalnik ── */
    .vprasalnik-wrapper {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 32px 120px;
    }
    .vprasalnik-wrapper h2 {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    .vprasalnik-wrapper .st-vprasanja {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .vprasalnik-wrapper .vprasanje-tekst {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 24px;
      font-family: 'Lora', serif;
    }
    .moznosti-lista {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .moznosti-lista li label {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 1rem;
      line-height: 1.5;
      background: #fff;
    }
    .moznosti-lista li label:hover { border-color: var(--accent); background: #d2e8ff; }
    .moznosti-lista li input[type="radio"] { margin-top: 3px; flex-shrink: 0; accent-color: var(--accent); }
    .moznosti-lista li input[type="radio"]:checked + span { font-weight: 600; }
    .moznosti-lista li:has(input:checked) label { border-color: #68a0ff; background: #d2e8ff; }

    /* ── Gumbi ── */
    .jspsych-btn,
    .btn-glavni {
      background: rgb(50, 110, 241);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 13px 36px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: inline-block;
      margin-top: 32px;
    }
    .jspsych-btn:hover,
    .btn-glavni:hover { background: #02599c; }

    .btn-fiksiran {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* ── Zaključek ── */
    .zakljucek {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 32px;
      text-align: center;
    }
    .zakljucek h1 { font-family: 'Lora', serif; font-size: 2rem; margin-bottom: 20px; }
    .zakljucek p { font-size: 1.05rem; color: #444; line-height: 1.8; }
  </style>
</head>

<body></body>

<script>

// --- BESEDILO 1 ---
const BESEDILO1_ODSTAVKI = [
  "To je prvi odstavek besedila 1. Vstavi svojo vsebino sem. Besedilo je lahko poljubno dolgo in bo prikazano na sredini zaslona.",
  "To je drugi odstavek besedila 1. Udeleženec bo prišel sem po pritisku na preslednico ali puščico desno.",
  "To je tretji odstavek besedila 1. Reklame na straneh se ob vsakem odstavku zamenjajo z naslednjo v vrsti.",
  "To je četrti odstavek besedila 1. Ko zmanjka reklam, se seznam začne znova od začetka.",
  "To je peti odstavek besedila 1. Po zadnjem odstavku sledi vprašalnik.",
];

const BESEDILO2_ODSTAVKI = [
  "To je prvi odstavek besedila 2. Vstavi svojo vsebino sem.",
  "To je drugi odstavek besedila 2. Besedilo napreduje s tipkami.",
  "To je tretji odstavek besedila 2. Reklame se prikazujejo vzporedno z odstavki.",
  "To je četrti odstavek besedila 2. Ko zmanjka reklam, se seznam začne znova od začetka.",
  "To je peti odstavek besedila 2. Po zadnjem odstavku sledi vprašalnik.",
];

// --- REKLAME ---
const REKLAME_LEVO = [
  "reklame/reklama_l1.mp4",
  "reklame/reklama_l2.mp4",
  "reklame/reklama_l3.mp4",
  "reklame/reklama_l4.mp4",
  "reklame/reklama_l5.mp4",
];
const REKLAME_DESNO = [
  "reklame/reklama_d1.mp4",
  "reklame/reklama_d2.mp4",
  "reklame/reklama_d3.mp4",
  "reklame/reklama_d4.mp4",
  "reklame/reklama_d5.mp4",
];

// VPRAŠALNIK 1
// pravilna: 0=a, 1=b, 2=c, 3=d
const VPRASALNIK1 = [
  { vprasanje: "Vprašanje 1 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 0 },
  { vprasanje: "Vprašanje 2 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 1 },
  { vprasanje: "Vprašanje 3 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 2 },
  { vprasanje: "Vprašanje 4 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 3 },
  { vprasanje: "Vprašanje 5 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 0 },
  { vprasanje: "Vprašanje 6 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 1 },
  { vprasanje: "Vprašanje 7 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 2 },
  { vprasanje: "Vprašanje 8 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 3 },
  { vprasanje: "Vprašanje 9 o besedilu 1?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 0 },
  { vprasanje: "Vprašanje 10 o besedilu 1?", moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 1 },
];

// VPRAŠALNIK 2
const VPRASALNIK2 = [
  { vprasanje: "Vprašanje 1 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 0 },
  { vprasanje: "Vprašanje 2 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 1 },
  { vprasanje: "Vprašanje 3 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 2 },
  { vprasanje: "Vprašanje 4 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 3 },
  { vprasanje: "Vprašanje 5 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 0 },
  { vprasanje: "Vprašanje 6 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 1 },
  { vprasanje: "Vprašanje 7 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 2 },
  { vprasanje: "Vprašanje 8 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 3 },
  { vprasanje: "Vprašanje 9 o besedilu 2?",  moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 0 },
  { vprasanje: "Vprašanje 10 o besedilu 2?", moznosti: ["Odgovor a", "Odgovor b", "Odgovor c", "Odgovor d"], pravilna: 1 },
];

// --- Pipedream URL ---
const PIPEDREAM_URL = "https://eodl32fjtfefsf6.m.pipedream.net";

// POMOŽNE FUNKCIJE
function preberiSkupino() {
  const sk = parseInt(new URLSearchParams(window.location.search).get("skupina"));
  return [1, 2, 3, 4].includes(sk) ? sk : null;
}

function shraniRezultate(podatki) {
  fetch(PIPEDREAM_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(podatki)
  });
}

// Vrne HTML za eno reklamo
function reklamaHTML(stran, odstavekIndex) {
  const reklame = stran === "levo" ? REKLAME_LEVO : REKLAME_DESNO;
  if (!reklame || reklame.length === 0) return "<div></div>";
  const pot = reklame[odstavekIndex];
  if (!pot) return "<div></div>";
  return `<div class="reklama-stran">
    <video src="${pot}" autoplay loop muted playsinline></video>
  </div>`;
}

// Blokira tipke za nazaj
function blokirajNazaj(e) {
  if (e.key === "Backspace" || e.key === "ArrowLeft" || (e.altKey && e.key === "ArrowLeft")) {
    e.preventDefault();
    e.stopPropagation();
  }
}

// GRADNIKI
function uvodniZaslon() {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="zaslon-uvod">
        <h1>Raziskava: Bralno razumevanje</h1>
        <p>Dobrodošli v tej raziskavi. Prosimo, da pozorno preberete navodila pred začetkom.</p>
        <p>V eksperimentu boste prebrali dve besedili in odgovorili na vprašanja o vsebini. Besedilo napredujete s pritiskom na <strong>preslednico</strong> ali <strong>puščico desno (→)</strong>.</p>
        <p>Eksperiment traja približno <strong>10–15 minut</strong>. Ko ste pripravljeni, pritisnite gumb spodaj.</p>
      </div>`,
    choices: ["Naprej"],
    button_html: `<button class="btn-glavni">%choice%</button>`
  };
}

function demografskiVprasalnik() {
  return {
    type: jsPsychSurveyHtmlForm,
    html: `
      <div class="demo-form">
        <h2>Osnovni podatki</h2>
        <label for="starost">Starost</label>
        <input type="number" id="starost" name="starost" min="6" max="100" required placeholder="npr. 19">
        <label for="spol">Spol</label>
        <select id="spol" name="spol" required>
          <option value="">— izberi —</option>
          <option value="M">Moški</option>
          <option value="Z">Ženski</option>
          <option value="D">Drugo / ne želim povedati</option>
        </select>
      </div>`,
    button_label: "Naprej",
    button_html: `<button class="btn-glavni btn-fiksiran">%choice%</button>`,
    data: { tip: "demografija" }   // oznaka za zanesljivo iskanje v on_finish
  };
}

function branjeTrials(odstavki, zReklamami) {
  return odstavki.map((odstavek, i) => ({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="branje-wrapper ${zReklamami ? 'z-reklamami' : 'brez-reklam'}">
        ${zReklamami ? reklamaHTML("levo", i) : ""}
        <div class="branje-besedilo">
          <div class="odstavek-tekst">${odstavek}</div>
          <div class="stevec-odstavkov">Odstavek ${i + 1} od ${odstavki.length}</div>
        </div>
        ${zReklamami ? reklamaHTML("desno", i) : ""}
      </div>
      <div class="navodilo-nadaljevanja">Pritisnite <strong>preslednico</strong> ali <strong>→</strong> za nadaljevanje</div>`,
    choices: [" ", "ArrowRight"],
    response_ends_trial: true,
    trial_duration: null,
    on_load: function() {
      document.addEventListener("keydown", blokirajNazaj, true);
    },
    on_finish: function() {
      document.removeEventListener("keydown", blokirajNazaj, true);
    },
    data: {
      tip: "branje",
      odstavek_st: i + 1,
      z_reklamami: zReklamami,
      reklama_levo:  zReklamami ? REKLAME_LEVO[i % REKLAME_LEVO.length]   : null,
      reklama_desno: zReklamami ? REKLAME_DESNO[i % REKLAME_DESNO.length] : null
    }
  }));
}

function vprasalnikTrials(vprasanja, stevilka) {
  return vprasanja.map((v, i) => ({
    type: jsPsychSurveyHtmlForm,

    html: `
      <div class="vprasalnik-wrapper">
        <h2>Vprašanja o besedilu ${stevilka}</h2>
        <div class="st-vprasanja">Vprašanje ${i + 1} od ${vprasanja.length}</div>
        <div class="vprasanje-tekst">${v.vprasanje}</div>

        <ul class="moznosti-lista">
          ${v.moznosti.map((m, mi) => `
            <li>
              <label>
                <input type="radio" name="odg" value="${mi}" required>
                <span>${['a', 'b', 'c', 'd'][mi]}) ${m}</span>
              </label>
            </li>
          `).join("")}
        </ul>
      </div>
    `,

    button_label: "Naprej",
    button_html: `<button class="btn-glavni btn-fiksiran">%choice%</button>`,

    data: {
      tip: "vprasanje",
      vprasalnik_st: stevilka,
      vprasanje_st: i + 1,
      pravilna_moznost: v.pravilna
    },

    on_finish: function(data) {
      let odgovor = null;

      try {
        const parsed = typeof data.response === "string"
          ? JSON.parse(data.response)
          : data.response;

        odgovor = parsed?.odg ?? null;
      } catch (e) {
        odgovor = null;
      }

      data.izbrani_odgovor = odgovor !== null ? parseInt(odgovor) : null;
      data.pravilno = data.izbrani_odgovor === data.pravilna_moznost;
    }
  }));
}

function vmesniZaslon() {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="zaslon-uvod">
        <h1>Kratek premor</h1>
        <p>Odgovorili ste na vprašanja prvega dela. Sedaj sledi drugo besedilo.</p>
        <p>Ko ste pripravljeni, pritisnite gumb spodaj.</p>
      </div>`,
    choices: ["Naprej"],
    button_html: `<button class="btn-glavni">%choice%</button>`
  };
}

function zakljucekZaslon() {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="zakljucek">
        <h1>Hvala za sodelovanje!</h1>
        <p>Eksperiment je zaključen. Vaši odgovori so bili uspešno zabeleženi.</p>
      </div>`,
    choices: ["Zapri"],
    button_html: `<button class="btn-glavni">%choice%</button>`
  };
}

// NAČRT SKUPIN (vsi imajo V1 po B1 in V2 po B2)
  // Skupina 1: B1, B2 (reklame)
  // Skupina 2: B1 (reklame), B2
  // Skupina 3: B2, B1 (reklame)
  // Skupina 4: B2 (reklame), B1

function sestaviSpored(skupina) {
  switch (skupina) {
    case 1: return [
      ...branjeTrials(BESEDILO1_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK1, 1),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO2_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK2, 2),
    ];
    case 2: return [
      ...branjeTrials(BESEDILO1_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK1, 1),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO2_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK2, 2),
    ];
    case 3: return [
      ...branjeTrials(BESEDILO2_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK2, 2),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO1_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK1, 1),
    ];
    case 4: return [
      ...branjeTrials(BESEDILO2_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK2, 2),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO1_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK1, 1),
    ];
  }
}

// ZAGON
const skupina = preberiSkupino();

if (!skupina) {
  document.body.innerHTML = `
    <div style="font-family:'Source Sans 3',sans-serif;max-width:500px;margin:80px auto;padding:32px;text-align:center;">
      <h2 style="font-family:'Lora',serif;margin-bottom:24px;">Eksperiment</h2>
      <p style="color:#555;margin-bottom:32px;">Izberi skupino:</p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <a href="?skupina=1" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 1</a>
        <a href="?skupina=2" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 2</a>
        <a href="?skupina=3" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 3</a>
        <a href="?skupina=4" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 4</a>
      </div>
    </div>`;
} else {
  const jsPsych = initJsPsych({
    on_finish: function() {
      const vsiPodatki = jsPsych.data.get();

      // Demografske podatke iščemo po oznaki "demografija" — zanesljivo
      const demoTrial = vsiPodatki.filter({ tip: "demografija" }).values()[0];
      const starost   = demoTrial?.response?.starost ?? "";
      const spol      = demoTrial?.response?.spol    ?? "";

      const odgovori = vsiPodatki.filter({ tip: "vprasanje" }).values();
      const branje   = vsiPodatki.filter({ tip: "branje" }).values();

      const payload = {
        cas_oddaje:  new Date().toISOString(),
        skupina:     skupina,
        starost:     starost,
        spol:        spol,
        odgovori: odgovori.map(t => ({
          vprasalnik: t.vprasalnik_st,
          vprasanje:  t.vprasanje_st,
          izbrano:    t.izbrani_odgovor,
          pravilno:   t.pravilno,
          rt_ms:      Math.round(t.rt)
        })),
        branje_casi: branje.map(t => ({
          odstavek:      t.odstavek_st,
          z_reklamami:   t.z_reklamami,
          reklama_levo:  t.reklama_levo,
          reklama_desno: t.reklama_desno,
          rt_ms:         Math.round(t.rt)
        }))
      };

      shraniRezultate(payload);
    }
  });

  const timeline = [
    uvodniZaslon(),
    demografskiVprasalnik(),
    ...sestaviSpored(skupina),
    zakljucekZaslon()
  ];

  jsPsych.run(timeline);
}

</script>
