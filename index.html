}

async function shraniRezultate(podatki) {
  try {
    await fetch(PIPEDREAM_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(podatki)
    });
    console.log("Podatki uspešno poslani.");
  } catch (e) {
    console.error("Napaka pri pošiljanju:", e);
  }
}

function reklamaHTML(stran, odstavekIndex) {
  const reklame = stran === "levo" ? REKLAME_LEVO : REKLAME_DESNO;
  if (!reklame || reklame.length === 0) return "<div></div>";
  const pot = reklame[odstavekIndex % reklame.length];
  if (!pot) return "<div></div>";
  return `<div class="reklama-stran">
    <video src="${pot}" autoplay loop muted playsinline></video>
  </div>`;
}

function blokirajNazaj(e) {
  if (e.key === "Backspace" || e.key === "ArrowLeft" || (e.altKey && e.key === "ArrowLeft")) {
    e.preventDefault();
    e.stopPropagation();
  }
}

function aktivirajDrsnik(id, prikazId) {
  const drsnik = document.getElementById(id);
  const prikaz = document.getElementById(prikazId);
  if (drsnik && prikaz) {
    prikaz.textContent = drsnik.value;
    drsnik.addEventListener("input", () => { prikaz.textContent = drsnik.value; });
  }
}

// Zanesljivo prebere vrednost iz jsPsychSurveyHtmlForm odgovora
// (plugin vrne objekt ali JSON niz, odvisno od verzije)
function preberiOdgovor(dataResponse) {
  if (!dataResponse) return {};
  if (typeof dataResponse === "string") {
    try { return JSON.parse(dataResponse); } catch (e) { return {}; }
  }
  return dataResponse;
}

// ============================================================
// GRADNIKI EKSPERIMENTA
// ============================================================

function uvodniZaslon() {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="zaslon-uvod">
        <h1>Raziskava: Bralno razumevanje</h1>
        <p>Dobrodošli v tej raziskavi. Prosimo, da pozorno preberete navodila pred začetkom.</p>
        <p>V eksperimentu boste prebrali dve besedili in odgovorili na vprašanja o vsebini. Besedilo napredujete s pritiskom na <strong>preslednico</strong> ali <strong>puščico desno (→)</strong>.</p>
        <p>Eksperiment traja približno <strong>10–15 minut</strong>. Ko ste pripravljeni, pritisnite gumb spodaj.</p>
      </div>`,
    choices: ["Naprej"],
    button_html: `<button class="btn-glavni">%choice%</button>`
  };
}

function demografskiVprasalnik() {
  return {
    type: jsPsychSurveyHtmlForm,
    html: `
      <div class="demo-form">
        <h2>Osnovni podatki</h2>

        <label for="starost">Starost</label>
        <input type="number" id="starost" name="starost" min="6" max="100" required placeholder="npr. 19">

        <label for="spol">Spol</label>
        <select id="spol" name="spol" required>
          <option value="">— izberi —</option>
          <option value="M">Moški</option>
          <option value="Z">Ženski</option>
          <option value="D">Drugo / ne želim povedati</option>
        </select>

        <div class="drsnik-skupina">
          <div class="drsnik-vprasanje">
            Kako bi ocenili svoje kuharske izkušnje?
            <em style="display:block; font-size:0.88rem; color:var(--muted); font-style:normal; margin-top:4px;">
              Ocenite na lestvici od 1 (brez izkušenj) do 10 (odličen/na kuhar/ica).
            </em>
          </div>
          <div class="drsnik-wrapper">
            <input type="range" id="kuhanje" name="kuhanje" min="1" max="10" value="5">
            <div class="drsnik-oznake">
              <span>1 – brez izkušenj</span>
              <span>10 – odličen/na kuhar/ica</span>
            </div>
            <div class="drsnik-vrednost" id="kuhanje-vrednost">5</div>
          </div>
        </div>
      </div>`,
    button_label: "Naprej",
    button_html: `<button class="btn-glavni btn-fiksiran">%choice%</button>`,
    data: { tip: "demografija" },
    on_load: function() {
      aktivirajDrsnik("kuhanje", "kuhanje-vrednost");
    },
    on_finish: function(data) {
      // Zanesljivo shrani demografske vrednosti direktno na data objekt
      const r = preberiOdgovor(data.response);
      data.starost_vrednost  = r.starost  ?? null;
      data.spol_vrednost     = r.spol     ?? null;
      data.kuhanje_vrednost  = r.kuhanje  !== undefined ? parseInt(r.kuhanje) : null;
    }
  };
}

function branjeTrials(odstavki, zReklamami) {
  return odstavki.map((odstavek, i) => ({
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div class="branje-wrapper ${zReklamami ? 'z-reklamami' : 'brez-reklam'}">
        ${zReklamami ? reklamaHTML("levo", i) : ""}
        <div class="branje-besedilo">
          <div class="odstavek-tekst">${odstavek}</div>
        </div>
        ${zReklamami ? reklamaHTML("desno", i) : ""}
      </div>
      <div class="navodilo-nadaljevanja">Pritisnite <strong>preslednico</strong> ali <strong>→</strong> za nadaljevanje</div>`,
    choices: [" ", "ArrowRight"],
    response_ends_trial: true,
    trial_duration: null,
    on_load: function() {
      document.addEventListener("keydown", blokirajNazaj, true);
    },
    on_finish: function() {
      document.removeEventListener("keydown", blokirajNazaj, true);
    },
    data: {
      tip: "branje",
      odstavek_st: i + 1,
      z_reklamami: zReklamami,
      reklama_levo:  zReklamami ? REKLAME_LEVO[i % REKLAME_LEVO.length]   : null,
      reklama_desno: zReklamami ? REKLAME_DESNO[i % REKLAME_DESNO.length] : null
    }
  }));
}

function vprasalnikTrials(vprasanja, stevilka) {
  return vprasanja.map((v, i) => ({
    type: jsPsychSurveyHtmlForm,
    html: `
      <div class="vprasalnik-wrapper">
        <h2>Vprašanja o besedilu ${stevilka}</h2>
        <div class="st-vprasanja">Vprašanje ${i + 1} od ${vprasanja.length}</div>
        <div class="vprasanje-tekst">${v.vprasanje}</div>
        <ul class="moznosti-lista">
          ${v.moznosti.map((m, mi) => `
            <li>
              <label>
                <input type="radio" name="odg" value="${mi}" required>
                <span>${['a', 'b', 'c', 'd'][mi]}) ${m}</span>
              </label>
            </li>
          `).join("")}
        </ul>
      </div>`,
    button_label: "Naprej",
    button_html: `<button class="btn-glavni btn-fiksiran">%choice%</button>`,
    data: {
      tip: "vprasanje",
      vprasalnik_st: stevilka,
      vprasanje_st: i + 1,
      pravilna_moznost: v.pravilna
    },
    on_finish: function(data) {
      const r = preberiOdgovor(data.response);
      data.izbrani_odgovor = r.odg !== undefined ? parseInt(r.odg) : null;
      data.pravilno = data.izbrani_odgovor === data.pravilna_moznost;
    }
  }));
}

function zahtevnostTrial(stevilkaBesedila) {
  return {
    type: jsPsychSurveyHtmlForm,
    html: `
      <div class="zaslon-drsnik">
        <h2>Zahtevnost besedila</h2>
        <p>
          Kako zahtevno se vam je zdelo besedilo ${stevilkaBesedila}?<br>
          <em style="font-size:0.9rem; color:var(--muted); font-style:normal;">
            Ocenite na lestvici od 1 (zelo enostavno) do 10 (zelo zahtevno).
          </em>
        </p>
        <div class="drsnik-wrapper">
          <input type="range" id="zahtevnost" name="zahtevnost" min="1" max="10" value="5">
          <div class="drsnik-oznake">
            <span>1 – zelo enostavno</span>
            <span>10 – zelo zahtevno</span>
          </div>
          <div class="drsnik-vrednost" id="zahtevnost-vrednost">5</div>
        </div>
      </div>`,
    button_label: "Naprej",
    button_html: `<button class="btn-glavni btn-fiksiran">%choice%</button>`,
    data: { tip: "zahtevnost", besedilo_st: stevilkaBesedila },
    on_load: function() {
      aktivirajDrsnik("zahtevnost", "zahtevnost-vrednost");
    },
    on_finish: function(data) {
      const r = preberiOdgovor(data.response);
      data.zahtevnost_ocena = r.zahtevnost !== undefined ? parseInt(r.zahtevnost) : null;
    }
  };
}

function vmesniZaslon() {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="zaslon-uvod">
        <h1>Kratek premor</h1>
        <p>Odgovorili ste na vprašanja prvega dela. Sedaj sledi drugo besedilo.</p>
        <p>Ko ste pripravljeni, pritisnite gumb spodaj.</p>
      </div>`,
    choices: ["Naprej"],
    button_html: `<button class="btn-glavni">%choice%</button>`
  };
}

function zakljucekZaslon() {
  return {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
      <div class="zakljucek">
        <h1>Hvala za sodelovanje!</h1>
        <p>Eksperiment je zaključen</p>
      </div>`,
    choices: ["Shranite podatke"],
    button_html: `<button class="btn-glavni">%choice%</button>`,
  };
}

// ============================================================
// SPOREDNI NAČRT
// ============================================================
// Skupina 1: B1 (brez) → V1 → zahtevnost B1 → B2 (z reklamami) → V2 → zahtevnost B2
// Skupina 2: B1 (z)    → V1 → zahtevnost B1 → B2 (brez)        → V2 → zahtevnost B2
// Skupina 3: B2 (brez) → V2 → zahtevnost B2 → B1 (z reklamami) → V1 → zahtevnost B1
// Skupina 4: B2 (z)    → V2 → zahtevnost B2 → B1 (brez)        → V1 → zahtevnost B1

function sestaviSpored(skupina) {
  switch (skupina) {
    case 1: return [
      ...branjeTrials(BESEDILO1_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK1, 1),
      zahtevnostTrial(1),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO2_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK2, 2),
      zahtevnostTrial(2),
    ];
    case 2: return [
      ...branjeTrials(BESEDILO1_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK1, 1),
      zahtevnostTrial(1),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO2_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK2, 2),
      zahtevnostTrial(2),
    ];
    case 3: return [
      ...branjeTrials(BESEDILO2_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK2, 2),
      zahtevnostTrial(2),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO1_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK1, 1),
      zahtevnostTrial(1),
    ];
    case 4: return [
      ...branjeTrials(BESEDILO2_ODSTAVKI, true),
      ...vprasalnikTrials(VPRASALNIK2, 2),
      zahtevnostTrial(2),
      vmesniZaslon(),
      ...branjeTrials(BESEDILO1_ODSTAVKI, false),
      ...vprasalnikTrials(VPRASALNIK1, 1),
      zahtevnostTrial(1),
    ];
  }
}

// ============================================================
// ZAGON
// ============================================================

const skupina = preberiSkupino();

if (!skupina) {
  document.body.innerHTML = `
    <div style="font-family:'Source Sans 3',sans-serif;max-width:500px;margin:80px auto;padding:32px;text-align:center;">
      <h2 style="font-family:'Lora',serif;margin-bottom:24px;">Eksperiment</h2>
      <p style="color:#555;margin-bottom:32px;">Izberi skupino:</p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        <a href="?skupina=1" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 1</a>
        <a href="?skupina=2" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 2</a>
        <a href="?skupina=3" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 3</a>
        <a href="?skupina=4" style="padding:14px;background:rgb(50,110,241);color:#fff;border-radius:4px;text-decoration:none;font-weight:600;">Skupina 4</a>
      </div>
    </div>`;
} else {
  const jsPsych = initJsPsych({
    on_finish: async function() {
      const vsiPodatki = jsPsych.data.get();

      // ── Demografija ──
      const demoTrial = vsiPodatki.filter({ tip: "demografija" }).values()[0];
      const starost   = demoTrial?.starost_vrednost  ?? null;
      const spol      = demoTrial?.spol_vrednost     ?? null;
      const kuhanje   = demoTrial?.kuhanje_vrednost  ?? null;

      // ── Vprašanja ──
      const odgovori = vsiPodatki.filter({ tip: "vprasanje" }).values();

      // ── Zahtevnost obeh besedil ──
      const zahtevnostTriali = vsiPodatki.filter({ tip: "zahtevnost" }).values();

      // ── Časi branja ──
      const branje = vsiPodatki.filter({ tip: "branje" }).values();

      // ── Sestavi JSON ──
      const payload = {
        cas_oddaje: new Date().toISOString(),
        skupina:    skupina,
        demografija: {
          starost:  starost,
          spol:     spol,
          kuhanje:  kuhanje
        },
        zahtevnost_besedil: zahtevnostTriali.map(t => ({
          besedilo: t.besedilo_st,
          ocena:    t.zahtevnost_ocena
        })),
        odgovori: odgovori.map(t => ({
          vprasalnik: t.vprasalnik_st,
          vprasanje:  t.vprasanje_st,
          izbrano:    t.izbrani_odgovor,
          pravilno:   t.pravilno,
          rt_ms:      Math.round(t.rt)
        })),
        branje_casi: branje.map(t => ({
          odstavek:      t.odstavek_st,
          z_reklamami:   t.z_reklamami,
          reklama_levo:  t.reklama_levo,
          reklama_desno: t.reklama_desno,
          rt_ms:         Math.round(t.rt)
        }))
      };

      // Počakaj da se podatki res pošljejo preden jsPsych zaključi
      await shraniRezultate(payload);
      // Zapri zaslon
      setTimeout(() => window.close(), 300);
    }
  });

  const timeline = [
    uvodniZaslon(),
    demografskiVprasalnik(),
    ...sestaviSpored(skupina),
    zakljucekZaslon()
  ];

  jsPsych.run(timeline);
}

</script>
